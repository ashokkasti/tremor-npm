name: "Build"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
  push:
    branches:
      - "**"
      - "!main"

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Setup PSE
        id: pse-setup
        uses: kkisalaya/ir-gh-action@v0.14
        with:
          api_url: 'https://app.invisirisk.com'
          app_token: ${{ secrets.INVISIRISK_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: install react
        run: npm i react
      - name: install dependencies
        run: npm ci
      - name: lint checks
        run: npm run lint
      - name: unit tests
        run: npm run tests
      - name: build
        run: npm run build
      - name: Cleanup PSE
        if: always()
        uses: kkisalaya/ir-gh-action@v0.14
        with:
          cleanup: 'true'